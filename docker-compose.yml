services:
    postgres:
        image: postgres:16-alpine
        container_name: webellian-postgres
        restart: unless-stopped
        volumes:
            - postgres_data:/var/lib/postgresql/data
        ports:
            - "5432:5432"
        environment:
            POSTGRES_DB: ${DATABASE_NAME:-webellian_db}
            POSTGRES_USER: ${DATABASE_USER:-postgres}
            POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
            POSTGRES_HOST_AUTH_METHOD: md5
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres']
            interval: 10s
            timeout: 5s
            retries: 5

    adminer:
        image: adminer:latest
        container_name: webellian-adminer
        restart: unless-stopped
        ports:
            - "8080:8080"
        depends_on:
            - postgres


volumes:
  postgres_data:
    driver: local